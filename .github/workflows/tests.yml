name: Tests

on:
  pull_request:
  push:
    branches: [main, test]
  merge_group:

permissions:
  contents: read

jobs:

  packaging:
    name: Python packaging
    uses: tskit-dev/.github/.github/workflows/python-packaging.yml@v18
    with:
      pyproject-directory: python
      cli-test-cmd: kastore --help

  test-c:
    name: C tests
    # zizmor: ignore[secrets-inherit] trusted first-party tskit-dev workflow;
    # it reads secrets.CODECOV_TOKEN without declaring a workflow_call secrets
    # block, so `secrets: inherit` is required for coverage upload to work.
    uses: tskit-dev/.github/.github/workflows/c-tests.yml@v17  # zizmor: ignore[secrets-inherit]
    with:
      library-directory: c
    secrets: inherit

  test-python-c:
    name: Python-C tests
    # zizmor: ignore[secrets-inherit] trusted first-party tskit-dev workflow;
    # it reads secrets.CODECOV_TOKEN without declaring a workflow_call secrets
    # block, so `secrets: inherit` is required for coverage upload to work.
    uses: tskit-dev/.github/.github/workflows/python-c-tests.yml@v17  # zizmor: ignore[secrets-inherit]
    with:
      tests: python/tests/test_python_c.py
      pyproject-directory: python
    secrets: inherit

  test:
    name: Python
    # zizmor: ignore[secrets-inherit] trusted first-party tskit-dev workflow;
    # it reads secrets.CODECOV_TOKEN without declaring a workflow_call secrets
    # block, so `secrets: inherit` is required for coverage upload to work.
    uses: tskit-dev/.github/.github/workflows/python-tests.yml@v17  # zizmor: ignore[secrets-inherit]
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python }}
      pyproject-directory: python
      coverage-directory: python/kastore
    secrets: inherit
    strategy:
      matrix:
        python: [ 3.11, 3.14 ]
        os:  [ macos-latest, ubuntu-24.04, windows-latest ]
